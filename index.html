// Save a single collection to Firestore
async function fbSave(col, items) {
  const batch = db.batch();
  // We store the entire collection as individual docs by id
  for (const item of items) {
    const docId = item.id || item.project; // revenue uses project as key
    batch.set(db.collection(col).doc(String(docId)), item);
  }
  await batch.commit();
}

// Delete a doc from Firestore
async function fbDelete(col, docId) {
  await db.collection(col).doc(String(docId)).delete();
}

// Seed defaults if DB is empty
async function seedIfEmpty() {
  const snap = await db.collection('projects').limit(1).get();
  if (snap.empty) {
    console.log('Seeding default data...');
    for (const col of ['projects','revenue','expenses','tasks']) {
      const batch = db.batch();
      for (const item of DEFAULTS[col]) {
        const docId = item.id || item.project;
        batch.set(db.collection(col).doc(String(docId)), item);
      }
      await batch.commit();
    }
  }
}

// Listen for real-time updates
function listenAll() {
  const cols = ['projects','revenue','expenses','tasks','documents'];
  cols.forEach(col => {
    db.collection(col).onSnapshot(snap => {
      state[col] = snap.docs.map(d => {
        const data = d.data();
        // Ensure numeric fields stay numeric
        if (col === 'revenue') { data.totalQuoted = Number(data.totalQuoted)||0; data.depositAmt = Number(data.depositAmt)||0; data.secondAmt = Number(data.secondAmt)||0; data.finalAmt = Number(data.finalAmt)||0; }
        if (col === 'expenses') { data.netAmount = Number(data.netAmount)||0; data.vat = Number(data.vat)||0; }
        return data;
      });
      state.synced = true;
      render();
    });
  });
}

    const td=state.tasks.filter(t=>t.project===p.name&&t.status==='Done').length;
    const tt=state.tasks.filter(t=>t.project===p.name).length;
    return{...p,quoted:q,received:rc,totalExp:te,matExp:me,conExp:ce,trvExp:ve,op,opPct,outstanding:out,pctComplete:tt?td/tt:0,tasksDone:td,tasksTotal:tt,daysLeft:daysLeft(p.endDate)};
  });
}

function getNotifs(){
  const n=[];
  state.tasks.forEach(t=>{if(t.status==='Done')return;const dl=daysLeft(t.dueDate);if(dl===null)return;if(dl<0)n.push({type:'overdue',text:t.description+' ('+t.project+') — '+Math.abs(dl)+'d overdue'});else if(dl<=7)n.push({type:'soon',text:t.description+' ('+t.project+') — due in '+dl+'d'});});
  state.projects.forEach(p=>{if(p.status!=='Active'||!p.endDate)return;const dl=daysLeft(p.endDate);if(dl!==null&&dl<0)n.push({type:'overdue',text:p.name+' deadline passed '+Math.abs(dl)+'d ago'});else if(dl!==null&&dl<=30)n.push({type:'soon',text:p.name+' deadline in '+dl+'d'});});
  state.revenue.forEach(r=>{if(r.totalQuoted>0){const rc=[r.depositStatus,r.secondStatus,r.finalStatus].filter(s=>s==='Received').length;const tot=[r.depositAmt,r.secondAmt,r.finalAmt].filter(a=>a>0).length;if(rc<tot)n.push({type:'payment',text:r.project+' — '+(tot-rc)+' payment(s) outstanding'})}});
  return n.sort((a,b)=>a.type==='overdue'?-1:1);
}

// Excel export
function doExport(pf){
  const wb=XLSX.utils.book_new();const p=getPnl();
  const fp=pf?p.filter(x=>x.name===pf):p;
  const fr=pf?state.revenue.filter(x=>x.project===pf):state.revenue;
  const fe=pf?state.expenses.filter(x=>x.project===pf):state.expenses;
  const ft=pf?state.tasks.filter(x=>x.project===pf):state.tasks;
  const s1=XLSX.utils.json_to_sheet(fp.map(x=>({"Project":x.name,"Client":x.client,"Status":x.status,"Phase":x.phase,"Priority":x.priority,"Total Quoted":x.quoted,"Total Received":x.received,"Materials":x.matExp,"Consultants":x.conExp,"Travel":x.trvExp,"Total Expenses":x.totalExp,"Operating Profit":x.op,"OP Margin %":+(x.opPct*100).toFixed(1),"Outstanding":x.outstanding})));
  s1["!cols"]=[{wch:28},{wch:22},{wch:10},{wch:18},{wch:8},{wch:14},{wch:14},{wch:12},{wch:12},{wch:10},{wch:14},{wch:16},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb,s1,"P&L Summary");
  const s2=XLSX.utils.json_to_sheet(fr.map(r=>({"Project":r.project,"Quotation #":r.quotationNum,"Total Quoted":r.totalQuoted,"Deposit":r.depositAmt,"Deposit Status":r.depositStatus,"2nd Pmt":r.secondAmt,"2nd Pmt Status":r.secondStatus,"Final":r.finalAmt,"Final Status":r.finalStatus,"Total Received":rcvd(r),"Outstanding":(r.totalQuoted||0)-rcvd(r)})));
  XLSX.utils.book_append_sheet(wb,s2,"Revenue");
  const s3=XLSX.utils.json_to_sheet(fe.map(e=>({"Project":e.project,"Category":e.category,"Description":e.description,"Supplier":e.supplier,"Date":e.date,"Net Amount":e.netAmount,"VAT":e.vat,"Total":e.netAmount+e.vat,"Paid":e.paid})));
  XLSX.utils.book_append_sheet(wb,s3,"Expenses");
  const s4=XLSX.utils.json_to_sheet(ft.map(t=>({"Project":t.project,"Description":t.description,"Category":t.category,"Assigned":t.assigned,"Due Date":t.dueDate,"Status":t.status,"Priority":t.priority})));
  XLSX.utils.book_append_sheet(wb,s4,"Tasks");
  XLSX.writeFile(wb,pf?'Viviaz_'+pf.replace(/[^a-zA-Z0-9]/g,'_')+'.xlsx':'Viviaz_Full_Report.xlsx');
}

// ═══════════════════════════════════════════════════════
// DOCUMENT EXCEL GENERATOR (calls server API)
// ═══════════════════════════════════════════════════════
async function generateDocExcel(docId){
  const doc=state.documents.find(d=>d.id===docId);if(!doc)return;
  const btn=event.target;btn.textContent='Generating...';btn.disabled=true;
  try{
    const resp=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(doc)});
    if(!resp.ok)throw new Error('Generation failed');
    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=(doc.docNumber||'document')+'_'+(doc.clientName||'').replace(/[^a-zA-Z0-9]/g,'_').substring(0,20)+'.xlsx';
    a.click();URL.revokeObjectURL(url);
  }catch(e){alert('Error generating document: '+e.message)}
  finally{btn.textContent='↓ Excel';btn.disabled=false}
}

  const inp=(l,v,f,t='text')=>`<div class="form-group"><label class="form-label">${l}</label><input class="form-input" type="${t}" value="${esc(v||'')}" onchange="updateEdit('${f}',${t==='number'?'Number(this.value)':'this.value'})" /></div>`;
  let body='';
  if(state.modal==='project') body=`<div class="form-grid">${inp('Project Name',it.name,'name')}${inp('Client',it.client,'client')}${inp('Email',it.email,'email')}${inp('Phone',it.phone,'phone')}${sel('Status',it.status,LISTS.statuses,'status')}${sel('Type',it.type,LISTS.types,'type')}${inp('Start Date',it.startDate,'startDate','date')}${inp('End Date',it.endDate,'endDate','date')}${inp('Designer',it.designer,'designer')}${sel('Phase',it.phase,LISTS.phases,'phase')}${sel('Priority',it.priority,LISTS.priorities,'priority')}</div>`;
  else if(state.modal==='expense') body=`<div class="form-grid">${sel('Project',it.project,pN,'project')}${sel('Category',it.category,LISTS.expCats,'category')}${inp('Description',it.description,'description')}${inp('Supplier',it.supplier,'supplier')}${inp('Date',it.date,'date','date')}${inp('Net Amount (€)',it.netAmount,'netAmount','number')}${inp('VAT (€)',it.vat,'vat','number')}${sel('Paid?',it.paid,LISTS.paid,'paid')}</div>`;
  else if(state.modal==='task') body=`<div class="form-grid">${sel('Project',it.project,pN,'project')}${sel('Category',it.category,LISTS.taskCats,'category')}<div class="form-group span-2"><label class="form-label">Description</label><input class="form-input" value="${esc(it.description||'')}" onchange="updateEdit('description',this.value)"/></div>${inp('Assigned',it.assigned,'assigned')}${inp('Due Date',it.dueDate,'dueDate','date')}${sel('Status',it.status,LISTS.taskStatuses,'status')}${sel('Priority',it.priority,LISTS.priorities,'priority')}</div>`;
  else if(state.modal==='revenue') body=`<div class="form-grid form-grid-4">${inp('Quotation #',it.quotationNum,'quotationNum')}${inp('Quote Date',it.quoteDate,'quoteDate','date')}${inp('Total Quoted (€)',it.totalQuoted,'totalQuoted','number')}<div></div>${inp('Deposit Inv',it.depositInv,'depositInv')}${inp('Deposit Date',it.depositDate,'depositDate','date')}${inp('Deposit (€)',it.depositAmt,'depositAmt','number')}${sel('Deposit Status',it.depositStatus,LISTS.payStatuses,'depositStatus')}${inp('2nd Pmt Inv',it.secondInv,'secondInv')}${inp('2nd Pmt Date',it.secondDate,'secondDate','date')}${inp('2nd Pmt (€)',it.secondAmt,'secondAmt','number')}${sel('2nd Pmt Status',it.secondStatus,LISTS.payStatuses,'secondStatus')}${inp('Final Inv',it.finalInv,'finalInv')}${inp('Final Date',it.finalDate,'finalDate','date')}${inp('Final (€)',it.finalAmt,'finalAmt','number')}${sel('Final Status',it.finalStatus,LISTS.payStatuses,'finalStatus')}</div>`;
  else if(state.modal==='document'){
    const isInv=it.docType==='Invoice';
    body=`<div style="margin-bottom:12px">${badge(it.docType)}</div>
    <div class="form-grid">
      ${inp('Document #',it.docNumber,'docNumber')}${inp('Date (DD.MM.YYYY)',it.date,'date')}
      ${sel('Project',it.projectName,pN,'projectName')}${inp('Location',it.location,'location')}
      ${inp('Client Name',it.clientName,'clientName')}${inp('Client VAT #',it.clientVat,'clientVat')}
      <div class="form-group span-2"><label class="form-label">Client Address (one line per row)</label><textarea class="form-input" rows="3" onchange="updateEdit('clientAddress',this.value)" style="resize:vertical">${esc(it.clientAddress||'')}</textarea></div>
      ${inp('Work Start Date',it.workStart,'workStart')}${inp('Work End Date',it.workEnd,'workEnd')}
    </div>
    <h4 style="margin:16px 0 8px;font-size:13px;color:#737373">${isInv?'Line Items':'Scope of Work'}</h4>
    ${isInv?`
      <div id="items-list">${(it.items||[]).map((item,i)=>`<div class="form-grid" style="margin-bottom:6px;grid-template-columns:120px 1fr 60px 80px 30px">
        <input class="form-input" placeholder="Item #" value="${esc(item.itemNumber)}" onchange="updateItemField(${i},'itemNumber',this.value)"/>
        <input class="form-input" placeholder="Description" value="${esc(item.description)}" onchange="updateItemField(${i},'description',this.value)"/>
        <input class="form-input" type="number" placeholder="Qty" value="${item.qty||''}" onchange="updateItemField(${i},'qty',Number(this.value))"/>
        <input class="form-input" type="number" placeholder="Price" value="${item.price||''}" onchange="updateItemField(${i},'price',Number(this.value))"/>
        <button class="btn btn-danger" style="padding:4px 8px" onclick="removeItem(${i})">✕</button>
      </div>`).join('')}</div>
      <button class="btn btn-ghost" style="margin-top:6px" onclick="addItem()">+ Add Item</button>
    `:`
      <div class="form-group"><label class="form-label">Scope lines (one per row — lines starting with "Phase" will be bold)</label><textarea class="form-input" rows="8" onchange="updateEdit('scopeText',this.value)" style="resize:vertical">${esc(it.scopeText||'')}</textarea></div>
    `}
    <h4 style="margin:16px 0 8px;font-size:13px;color:#737373">Totals & Payment</h4>
    <div class="form-grid">
      ${inp('Total excl. VAT',it.totalExclVat,'totalExclVat','number')}${inp('VAT % (0 for reverse charge)',it.vatPercent,'vatPercent','number')}${sel('Currency',it.currency||'€',['€','$'],'currency')}
    </div>
    <div class="form-group" style="margin-top:8px"><label class="form-label">Payment terms (one per line, leave empty if not needed)</label><textarea class="form-input" rows="3" onchange="updateEdit('paymentText',this.value)" style="resize:vertical">${esc(it.paymentText||'')}</textarea></div>`;
  }
  const titles={project:it._isNew?'New Project':'Edit Project',expense:it._isNew?'New Expense':'Edit Expense',task:it._isNew?'New Task':'Edit Task',revenue:'Edit Revenue',document:it._isNew?'New '+((it.docType)||'Document'):'Edit '+((it.docType)||'Document')};
  el.innerHTML=`<div class="modal-overlay" onclick="closeModal()"><div class="modal${state.modal==='revenue'||state.modal==='document'?' wide':''}" onclick="event.stopPropagation()"><div class="flex-between" style="margin-bottom:20px"><h3 class="modal-title" style="margin:0">${titles[state.modal]}</h3><button style="background:none;border:none;font-size:18px;color:#A3A3A3;cursor:pointer" onclick="closeModal()">✕</button></div>${body}<div style="display:flex;gap:8px;margin-top:20px;justify-content:flex-end">${!it._isNew?'<button class="btn btn-danger" onclick="deleteItem()">Delete</button>':''}<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveItem()">Save</button></div></div></div>`;
}

function updateEdit(f,v){state.editItem[f]=v;renderModal()}
function addItem(){if(!state.editItem.items)state.editItem.items=[];state.editItem.items.push({itemNumber:'',description:'',qty:0,price:0});renderModal()}
function removeItem(i){state.editItem.items.splice(i,1);renderModal()}
function updateItemField(i,f,v){state.editItem.items[i][f]=v;renderModal()}

function addProject(){showModal('project',{id:'PRJ-'+Date.now(),name:'',client:'',email:'',phone:'',status:'Planning',type:'',startDate:'',endDate:'',designer:'Viviane Z',phase:'Briefing',priority:'Medium',_isNew:true})}
function editProject(id){const p=state.projects.find(x=>x.id===id);if(p)showModal('project',{...p})}
function addExpense(){showModal('expense',{id:'E-'+Date.now(),project:'',category:'',description:'',supplier:'',date:'',netAmount:0,vat:0,paid:'No',_isNew:true})}
function editExpense(id){const e=state.expenses.find(x=>x.id===id);if(e)showModal('expense',{...e})}
function addTask(){showModal('task',{id:'T-'+Date.now(),project:'',description:'',category:'',assigned:'Viviane Z',dueDate:'',status:'To Do',priority:'Medium',_isNew:true})}
function editTask(id){const t=state.tasks.find(x=>x.id===id);if(t)showModal('task',{...t})}
function editRevenue(id){const r=state.revenue.find(x=>x.id===id);if(r)showModal('revenue',{...r})}
function addDocument(type){showModal('document',{id:'DOC-'+Date.now(),docType:type,docNumber:'',date:'',clientName:'',clientAddress:'',clientVat:'',projectName:'',location:'',workStart:'',workEnd:'',currency:'€',items:[],scopeLines:[],scopeText:'',totalExclVat:0,vatPercent:0,paymentTerms:[],paymentText:'',_isNew:true})}
function editDocument(id){const d=state.documents.find(x=>x.id===id);if(d)showModal('document',{...d,scopeText:(d.scopeLines||[]).join('\n'),paymentText:(d.paymentTerms||[]).join('\n')})}

async function saveItem(){
  const it=state.editItem;if(!it)return;
  // Remove _isNew flag before saving
  const clean={...it};delete clean._isNew;

  if(state.modal==='project'){
    if(!it.name)return;
    // If renaming, update all linked records
    if(!it._isNew){
      const old=state.projects.find(p=>p.id===it.id);
      if(old&&old.name!==it.name){
        for(const r of state.revenue.filter(r=>r.project===old.name)){r.project=it.name;await db.collection('revenue').doc(r.id).update({project:it.name})}
        for(const e of state.expenses.filter(e=>e.project===old.name)){e.project=it.name;await db.collection('expenses').doc(e.id).update({project:it.name})}
        for(const t of state.tasks.filter(t=>t.project===old.name)){t.project=it.name;await db.collection('tasks').doc(t.id).update({project:it.name})}
      }
    }
    await db.collection('projects').doc(clean.id).set(clean);
    // If new project, also create a revenue record
    if(it._isNew){const rev={id:'R-'+Date.now(),project:it.name,quotationNum:'',quoteDate:'',totalQuoted:0,depositInv:'',depositDate:'',depositAmt:0,depositStatus:'Not Received',secondInv:'',secondDate:'',secondAmt:0,secondStatus:'Not Received',finalInv:'',finalDate:'',finalAmt:0,finalStatus:'Not Received'};await db.collection('revenue').doc(rev.id).set(rev)}
  }
  else if(state.modal==='expense'){if(!it.project)return;await db.collection('expenses').doc(clean.id).set(clean)}
  else if(state.modal==='task'){if(!it.project||!it.description)return;await db.collection('tasks').doc(clean.id).set(clean)}
  else if(state.modal==='revenue'){await db.collection('revenue').doc(clean.id).set(clean)}
  else if(state.modal==='document'){
    // Process text fields into arrays
    if(clean.scopeText){clean.scopeLines=clean.scopeText.split('\n').filter(l=>l.trim());delete clean.scopeText}
    if(clean.paymentText){clean.paymentTerms=clean.paymentText.split('\n').filter(l=>l.trim());delete clean.paymentText}
    clean.totalExclVat=Number(clean.totalExclVat)||0;
    clean.vatPercent=Number(clean.vatPercent)||0;
    await db.collection('documents').doc(clean.id).set(clean);
  }
  closeModal();
}

async function deleteItem(){
  const it=state.editItem;if(!it)return;
  const col={project:'projects',expense:'expenses',task:'tasks',document:'documents'}[state.modal];
  if(col)await db.collection(col).doc(it.id).delete();
  closeModal();
}

document.addEventListener('click',e=>{if(state.notifOpen&&!e.target.closest('.dropdown')&&!e.target.closest('.btn')){state.notifOpen=false;render()}if(state.exportOpen&&!e.target.closest('.dropdown')&&!e.target.closest('.btn')){state.exportOpen=false;render()}});
</script>
</body>
</html>
